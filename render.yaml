# Root Directory en Render: déjalo en la raíz del repo (vacío), no "src".
# Si Root Directory = src, Start debe ser "node server.js", NO "node src/server.js".
services:
  - type: web
    name: mailspark
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: DOMAIN
        value: turnosok.com
